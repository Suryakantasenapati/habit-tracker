<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Tracker</title>
</head>
<body>
    <h2>Habit Tracker</h2>

    <input type="text" id="habitInput" placeholder="Enter a new habit...">
    <button id="addHabitBtn">Add Habit</button>

    <ul id="habitList"></ul>

    <script type="module">
      // Import Firebase modules
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
      import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

      // Your exact Firebase configuration keys
      const firebaseConfig = {
        apiKey: "AIzaSyAk89GKjNsmzIouMJn9Gt0XaB9uUekXsGg",
        authDomain: "habit-tracker-for-tm.firebaseapp.com",
        projectId: "habit-tracker-for-tm",
        storageBucket: "habit-tracker-for-tm.firebasestorage.app",
        messagingSenderId: "258753103740",
        appId: "1:258753103740:web:1b82dd437b2b8b7c8706f9",
        measurementId: "G-2D1EVDNYD5"
      };

      // Initialize Firebase and Firestore Database
      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      // 1. SAVE DATA: Triggered when you click the "Add Habit" button
      document.getElementById("addHabitBtn").addEventListener("click", async () => {
        const habitText = document.getElementById("habitInput").value.trim();
        if (habitText === "") {
          alert("Please enter a habit!");
          return;
        }
        try {
          await addDoc(collection(db, "habits"), {
            name: habitText,
            createdAt: new Date()
          });
          document.getElementById("habitInput").value = ""; // Clear the input box
        } catch (error) {
          console.error("Error saving to database: ", error);
        }
      });

      // 2. SHOW DATA: Reads the database and updates the screen in real-time
      const habitsQuery = query(collection(db, "habits"), orderBy("createdAt", "desc"));
      onSnapshot(habitsQuery, (snapshot) => {
        const habitList = document.getElementById("habitList");
        habitList.innerHTML = ""; // Clear old entries to prevent duplicates

        snapshot.forEach((doc) => {
          const habitData = doc.data();
          const li = document.createElement("li");
          li.textContent = habitData.name;
          habitList.appendChild(li);
        });
      });
    </script>
</body>
</html>
