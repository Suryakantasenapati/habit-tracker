<script type="module">
    // 1. Import dynamic Firebase Architecture modules
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // 2. Verified Active Cloud Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyAk89GKjNsmzIouMJn9Gt0XaB9uUekXsGg",
        authDomain: "habit-tracker-for-tm.firebaseapp.com",
        projectId: "habit-tracker-for-tm",
        storageBucket: "habit-tracker-for-tm.firebasestorage.app",
        messagingSenderId: "258753103740",
        appId: "1:258753103740:web:1b82dd437b2b8b7c8706f9",
        measurementId: "G-2D1EVDNYD5"
    };

    // Initialize Global Instances
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- APPLICATION VARIABLES ---
    let users = [];
    let currentUser = null;
    let viewingUsername = null; 
    const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
    let today = new Date();
    let selectedYear = today.getFullYear();
    let selectedMonth = today.getMonth(); 
    let userHabitData = {};
    const baseColors = ['#b45f06', '#0b5394', '#990000', '#38761d', '#741b47'];
    let chartInstances = {};
    let currentWeeks = [];
    let daysInMonth = 31;
    
    const habits = [
        { id: 1, name: "Daily 50 New Connection", dailyTarget: 50 },
        { id: 2, name: "Find 20 New Company", dailyTarget: 20 },
        { id: 3, name: "Daily 50 Email & Followup", dailyTarget: 50 },
        { id: 4, name: "Daily Data Update", dailyTarget: 1 }
    ];

    // --- CLOUD DATABASING METHODS ---

    async function fetchUsersFromCloud() {
        const userRef = doc(db, "system", "auth");
        const docSnap = await getDoc(userRef);
        if (docSnap.exists()) {
            users = docSnap.data().userList || [];
        } else {
            // Seed Database with standard profiles if completely blank
            users = [
                { username: 'admin', password: '123', role: 'admin', secQuestion: "What is your favorite color?", secAnswer: "blue" },
                { username: 'user1', password: '123', role: 'user', secQuestion: "What is your favorite color?", secAnswer: "blue" },
                { username: 'user2', password: '123', role: 'user', secQuestion: "What is the name of your first pet?", secAnswer: "buddy" }
            ];
            await setDoc(userRef, { userList: users });
        }
    }

    async function saveUsersToCloud() {
        const userRef = doc(db, "system", "auth");
        await setDoc(userRef, { userList: users }, { merge: true });
    }

    async function loadUserData() {
        const docId = `${viewingUsername}_${selectedYear}_${selectedMonth}`;
        const dataRef = doc(db, "habits", docId);
        const docSnap = await getDoc(dataRef);

        if (docSnap.exists()) {
            userHabitData = docSnap.data();
        } else {
            userHabitData = { 1: [], 2: [], 3: [], 4: [] };
        }
        renderDashboard();
    }

    async function saveTrackerState(habitId, day, isChecked) {
        if (!userHabitData[habitId]) userHabitData[habitId] = [];
        
        if (isChecked) {
            if (!userHabitData[habitId].includes(day)) userHabitData[habitId].push(day);
        } else {
            userHabitData[habitId] = userHabitData[habitId].filter(d => d !== day);
        }

        const docId = `${viewingUsername}_${selectedYear}_${selectedMonth}`;
        const dataRef = doc(db, "habits", docId);
        
        await setDoc(dataRef, userHabitData, { merge: true });
        calculate(); 
    }

    // --- SYSTEM OPERATIONS & RUNTIME VALIDATIONS ---

    async function checkSession() {
        await fetchUsersFromCloud();
        const sessionUser = sessionStorage.getItem('ht_session');
        if (sessionUser) {
            currentUser = users.find(u => u.username === sessionUser);
            if(currentUser) {
                checkUserSecurityStatus();
                return;
            }
        }
        showView('loginView');
    }

    function attemptLogin() {
        const u = document.getElementById('usernameInput').value.trim().toLowerCase();
        const p = document.getElementById('passwordInput').value.trim();
        const found = users.find(user => user.username.toLowerCase() === u && user.password === p);

        if (found) {
            currentUser = found;
            sessionStorage.setItem('ht_session', found.username);
            document.getElementById('loginError').innerText = "";
            checkUserSecurityStatus();
        } else {
            document.getElementById('loginError').innerText = "Invalid credentials!";
        }
    }

    function checkUserSecurityStatus() {
        if (!currentUser.secQuestion) {
            showView('setupSecurityView');
        } else {
            routeUser();
        }
    }

    async function saveSecuritySetup() {
        const sq = document.getElementById('userSetupQuestion').value;
        const sa = document.getElementById('userSetupAnswer').value.trim();
        
        if (!sq) return alert("Please choose a security question from the dropdown.");
        if (!sa) return alert("Please type an answer to your security question.");
        
        currentUser.secQuestion = sq;
        currentUser.secAnswer = sa.toLowerCase(); 
        
        const userIndex = users.findIndex(u => u.username === currentUser.username);
        if (userIndex !== -1) {
            users[userIndex] = currentUser;
            await saveUsersToCloud();
        }
        routeUser();
    }

    function routeUser() {
        if (currentUser.role === 'admin') {
            showView('adminView');
            renderUserList();
            initAdminControls();
        } else {
            viewingUsername = currentUser.username; 
            showView('appView');
            initControls();
            loadUserData();
        }
    }

    function logout() {
        currentUser = null;
        viewingUsername = null;
        sessionStorage.removeItem('ht_session');
        document.getElementById('usernameInput').value = '';
        document.getElementById('passwordInput').value = '';
        document.getElementById('passwordInput').type = "password";
        document.querySelectorAll('.toggle-password').forEach(icon => icon.innerText = "👁️");
        showView('loginView');
    }

    async function changePassword() {
        const current = prompt("Enter your current password:");
        if (current === null) return; 
        if (current !== currentUser.password) return alert("Incorrect current password.");

        const newPass = prompt("Enter your NEW password:");
        if (!newPass || newPass.trim() === "") return alert("Password cannot be empty.");

        const confirmPass = prompt("Confirm your NEW password:");
        if (newPass !== confirmPass) return alert("Passwords do not match.");

        currentUser.password = newPass.trim();
        const userIndex = users.findIndex(u => u.username === currentUser.username);
        if (userIndex !== -1) {
            users[userIndex] = currentUser;
            await saveUsersToCloud();
            alert("Password successfully changed!");
        }
    }

    function forgotPassword() {
        const username = prompt("Enter your username to reset your password:");
        if (username) {
            const searchUser = username.trim().toLowerCase();
            const user = users.find(u => u.username.toLowerCase() === searchUser);
            if (!user) return alert("Username not found.");
            if (!user.secQuestion) return alert("Account security missing. Contact administrator.");
            
            const answer = prompt(`Security Question: ${user.secQuestion}\n\nEnter your answer:`);
            if (answer !== null && answer.trim().toLowerCase() === user.secAnswer) {
                const newPassword = prompt("Correct Answer!\n\nEnter your NEW password:");
                if (newPassword && newPassword.trim() !== "") {
                    user.password = newPassword.trim();
                    saveUsersToCloud().then(() => alert("Password updated successfully!"));
                }
            } else {
                alert("Incorrect security answer!");
            }
        }
    }

    function renderUserList() {
        const list = document.getElementById('userList');
        list.innerHTML = '';
        users.forEach(u => {
            if (u.role === 'admin') return;
            const setupStatus = u.secQuestion ? '' : '<span style="color:#d9534f; font-size:11px;">(Security setup pending)</span>';
            list.innerHTML += `
                <div class="user-item">
                    <span><strong>${u.username}</strong> (Pass: ${u.password}) ${setupStatus}</span>
                    <div class="user-actions">
                        <button class="btn" style="background:#0b5394; color:white; margin-top:0;" onclick="viewUserDash('${u.username}')">View</button>
                        <button class="btn-info" style="margin-top:0; color:white; margin-left:5px;" onclick="adminResetUserPassword('${u.username}')">Reset Pass</button>
                        <button class="btn-danger" style="margin-top:0;" onclick="deleteUser('${u.username}')">Delete</button>
                    </div>
                </div>`;
        });
    }

    // --- DOM CONTROLS & RENDER CALCULATIONS ---

    function isSaturday(day) {
        return new Date(selectedYear, selectedMonth, day).getDay() === 6;
    }

    function initControls() {
        const uSelect = document.getElementById('userSelect');
        const mSelect = document.getElementById('monthSelect');
        const ySelect = document.getElementById('yearSelect');
        
        uSelect.innerHTML = ''; mSelect.innerHTML = ''; ySelect.innerHTML = '';

        users.filter(u => u.role === 'user').forEach(u => {
            let opt = document.createElement('option'); 
            opt.value = u.username; opt.innerText = u.username.toUpperCase() + "'s Tracker";
            uSelect.appendChild(opt);
        });
        uSelect.value = viewingUsername;

        monthNames.forEach((m, idx) => {
            let opt = document.createElement('option'); opt.value = idx; opt.innerText = m;
            mSelect.appendChild(opt);
        });
        for (let y = 2024; y <= 2030; y++) {
            let opt = document.createElement('option'); opt.value = y; opt.innerText = y;
            ySelect.appendChild(opt);
        }

        mSelect.value = selectedMonth; ySelect.value = selectedYear;

        uSelect.onchange = (e) => { viewingUsername = e.target.value; loadUserData(); };
        mSelect.onchange = (e) => { selectedMonth = parseInt(e.target.value); loadUserData(); };
        ySelect.onchange = (e) => { selectedYear = parseInt(e.target.value); loadUserData(); };
    }

    function calculateDynamicWeeks() {
        daysInMonth = new Date(selectedYear, selectedMonth + 1, 0).getDate();
        currentWeeks = [];
        let startDay = 1;
        for (let i = 0; i < 5; i++) {
            if (startDay > daysInMonth) break; 
            let endDay = Math.min(startDay + 6, daysInMonth);
            let workingDays = 0;
            for(let d = startDay; d <= endDay; d++) { if (!isSaturday(d)) workingDays++; }
            currentWeeks.push({ name: 'Week ' + (i + 1), span: endDay - startDay + 1, workingDays: workingDays, bgClass: `w${i+1}-bg`, textClass: `w${i+1}-text`, cbClass: `cb-w${i+1}`, color: baseColors[i] });
            startDay = endDay + 1;
        }
    }

    function renderDashboard() {
        document.getElementById('mainHeader').innerText = `${viewingUsername.toUpperCase()}'s Tracker - ${monthNames[selectedMonth]} ${selectedYear}`;
        calculateDynamicWeeks();
        Object.values(chartInstances).forEach(chart => chart.destroy());
        chartInstances = {};
        renderHeaders();
        renderBody();
        renderSummary();
        initCharts();
        calculate();
    }

    function renderHeaders() {
        const thead = document.getElementById('tableHead');
        let weekRow = `<tr id="weekHeaderRow"><th rowspan="3" class="habit-name">Habits<br>Dates<br>Days</th>`;
        let datesRow = `<tr id="datesHeaderRow">`;
        let daysRow = `<tr id="daysHeaderRow">`;
        let currentDay = 1;

        currentWeeks.forEach(week => {
            weekRow += `<th colspan="${week.span}" class="${week.textClass}">${week.name}</th>`;
            for (let i = 0; i < week.span; i++) {
                let dayName = new Date(selectedYear, selectedMonth, currentDay).toLocaleDateString('en-US', { weekday: 'short' });
                let offClass = isSaturday(currentDay) ? 'off-day' : '';
                datesRow += `<th class="col-day ${week.bgClass} ${offClass}">${currentDay}</th>`;
                daysRow += `<th class="col-day day-text ${week.bgClass} ${offClass}">${dayName}</th>`;
                currentDay++;
            }
        });
        weekRow += `<th rowspan="3" class="col-goal" style="background:white;">Monthly Goal</th><th rowspan="3" class="col-progress">Monthly Progress</th></tr>`;
        thead.innerHTML = weekRow + datesRow + "</tr>" + daysRow + "</tr>";
    }

    function renderBody() {
        const tbody = document.getElementById('trackerBody');
        tbody.innerHTML = '';
        const isReadonly = (currentUser.role !== 'admin' && currentUser.username !== viewingUsername) ? 'disabled' : '';

        habits.forEach(habit => {
            let tr = `<tr><td class="habit-name">${habit.name}</td>`;
            let dayCount = 1;
            currentWeeks.forEach(week => {
                for (let i = 0; i < week.span; i++) {
                    if (isSaturday(dayCount)) {
                        tr += `<td class="${week.bgClass} off-day">OFF</td>`;
                    } else {
                        const isChecked = (userHabitData[habit.id] && userHabitData[habit.id].includes(dayCount)) ? 'checked' : '';
                        tr += `<td class="${week.bgClass}">
                            <input type="checkbox" class="custom-cb ${week.cbClass}" data-day="${dayCount}" data-week="${week.name}" data-habit="${habit.id}" ${isChecked} ${isReadonly} onchange="saveTrackerState(${habit.id}, ${dayCount}, this.checked)">
                        </td>`;
                    }
                    dayCount++;
                }
            });
            tr += `<td class="col-goal" id="goal-val-${habit.id}">0</td><td><div class="progress-bar-container"><div class="progress-bar" id="prog-${habit.id}"></div><span class="progress-text" id="prog-text-${habit.id}">0%</span></div></td></tr>`;
            tbody.innerHTML += tr;
        });
    }

    function renderSummary() {
        const summary = document.getElementById('summaryBody');
        summary.innerHTML = `<tr><td class="summary-label" style="border:none;"></td><td colspan="${daysInMonth}" style="border:none;"></td><th style="font-weight:bold;">Total</th><td style="border:none;"></td></tr>`;

        let rComp = `<tr><td class="summary-label">Habits Completed</td>`;
        for(let i=1; i<=daysInMonth; i++) { rComp += `<td id="d-comp-${i}" class="${isSaturday(i) ? 'off-day' : ''}">-</td>`; }
        summary.innerHTML += rComp + `<td id="grand-comp" class="col-goal">0</td><td style="border:none;"></td></tr>`;

        let rInc = `<tr><td class="summary-label">Habits Incomplete</td>`;
        for(let i=1; i<=daysInMonth; i++) { rInc += `<td id="d-inc-${i}" class="${isSaturday(i) ? 'off-day' : ''}">-</td>`; }
        summary.innerHTML += rInc + `<td id="grand-inc" class="col-goal">0</td><th style="font-weight:bold; border-bottom:none;">Total Monthly Progress</th></tr>`;

        let rWComp = `<tr><td class="summary-label">Weekly Habits Completed</td>`;
        currentWeeks.forEach(w => rWComp += `<td colspan="${w.span}" id="w-comp-${w.name.replace(' ', '')}">0</td>`);
        summary.innerHTML += rWComp + `<td colspan="2" rowspan="4" style="vertical-align:top;"><div class="big-chart-container"><canvas id="chart-Total"></canvas><span class="total-percent-overlay" id="total-percent-text">0%</span></div></td></tr>`;

        let rWInc = `<tr><td class="summary-label">Weekly Habits Incomplete</td>`;
        currentWeeks.forEach(w => rWInc += `<td colspan="${w.span}" id="w-inc-${w.name.replace(' ', '')}">0</td>`);
        summary.innerHTML += rWInc + `</tr>`;

        let rCharts = `<tr class="chart-row"><td class="summary-label">Progress per Week</td>`;
        currentWeeks.forEach(w => { rCharts += `<td colspan="${w.span}"><div class="chart-wrapper"><canvas id="chart-${w.name.replace(' ', '')}"></canvas></div></td>`; });
        summary.innerHTML += rCharts + `</tr>`;

        let rPerc = `<tr><td class="summary-label" style="font-weight:bold;">Percentage % per Week</td>`;
        currentWeeks.forEach(w => rPerc += `<td colspan="${w.span}" id="w-perc-${w.name.replace(' ', '')}" style="font-weight:bold;">0.00%</td>`);
        summary.innerHTML += rPerc + `</tr>`;
    }

    function initCharts() {
        const createDonut = (id, color, cutout) => {
            return new Chart(document.getElementById(id).getContext('2d'), { type: 'doughnut', data: { labels: ['Completed', 'Incomplete'], datasets: [{ data: [0, 1], backgroundColor: [color, '#e0e0e0'], borderWidth: 0 }] }, options: { cutout: cutout, plugins: { legend: { display: false }, tooltip: { enabled: false } }, maintainAspectRatio: false } });
        };
        currentWeeks.forEach(w => { chartInstances[w.name.replace(' ', '')] = createDonut(`chart-${w.name.replace(' ', '')}`, w.color, '65%'); });
        chartInstances['Total'] = createDonut('chart-Total', '#4caf50', '70%');
        chartInstances['Total'].data.datasets[0].backgroundColor = ['#4caf50', '#f44336'];
    }

    function calculate() {
        const totalHabits = habits.length; 
        let weeklyStats = {};
        currentWeeks.forEach(w => weeklyStats[w.name] = { completed: 0, total: w.workingDays * totalHabits });
        let grandTotalCompleted = 0;
        let workingDaysInMonth = currentWeeks.reduce((sum, w) => sum + w.workingDays, 0);
        const grandTotalPossible = workingDaysInMonth * totalHabits;

        for (let d = 1; d <= daysInMonth; d++) {
            if (isSaturday(d)) continue;
            let completedToday = 0;
            document.querySelectorAll(`input[data-day="${d}"]`).forEach(cb => {
                if (cb.checked) { completedToday++; weeklyStats[cb.getAttribute('data-week')].completed++; grandTotalCompleted++; }
            });
            document.getElementById(`d-comp-${d}`).innerText = completedToday;
            document.getElementById(`d-inc-${d}`).innerText = totalHabits - completedToday;
        }

        currentWeeks.forEach(week => {
            const wKey = week.name.replace(' ', ''); const stats = weeklyStats[week.name]; const incomplete = stats.total - stats.completed;
            document.getElementById(`w-comp-${wKey}`).innerText = stats.completed; document.getElementById(`w-inc-${wKey}`).innerText = incomplete;
            document.getElementById(`w-perc-${wKey}`).innerText = stats.total > 0 ? `${((stats.completed / stats.total) * 100).toFixed(2)}%` : "0.00%";
            chartInstances[wKey].data.datasets[0].data = stats.total === 0 ? [0, 1] : [stats.completed, incomplete];
            chartInstances[wKey].data.datasets[0].backgroundColor = stats.total === 0 ? ['#e0e0e0', '#e0e0e0'] : [week.color, '#e0e0e0'];
            chartInstances[wKey].update();
        });

        document.getElementById('grand-comp').innerText = grandTotalCompleted;
        document.getElementById('grand-inc').innerText = grandTotalPossible - grandTotalCompleted;
        chartInstances['Total'].data.datasets[0].data = [grandTotalCompleted, grandTotalPossible - grandTotalCompleted];
        chartInstances['Total'].update();
        document.getElementById('total-percent-text').innerText = grandTotalPossible > 0 ? `${((grandTotalCompleted / grandTotalPossible) * 100).toFixed(1)}%` : "0%";

        habits.forEach(habit => {
            const checkedCount = document.querySelectorAll(`input[data-habit="${habit.id}"]:checked`).length;
            document.getElementById(`goal-val-${habit.id}`).innerText = habit.dailyTarget * workingDaysInMonth;
            let rawPercent = workingDaysInMonth > 0 ? (checkedCount / workingDaysInMonth) * 100 : 0;
            document.getElementById(`prog-${habit.id}`).style.width = `${rawPercent > 100 ? 100 : rawPercent}%`;
            document.getElementById(`prog-text-${habit.id}`).innerText = `${rawPercent.toFixed(1)}%`;
        });
    }

    // --- REPORT DOWNLOAD ENGINE ---

    function initAdminControls() {
        const dlUserSelect = document.getElementById('dlUserSelect');
        dlUserSelect.innerHTML = '<option value="all">-- All Users --</option>';
        users.filter(u => u.role === 'user').forEach(u => {
            let opt = document.createElement('option'); opt.value = u.username; opt.innerText = u.username;
            dlUserSelect.appendChild(opt);
        });
        document.getElementById('dlMonthSelect').innerHTML = ''; 
        monthNames.forEach((m, idx) => {
            let opt = document.createElement('option'); opt.value = idx; opt.innerText = m;
            document.getElementById('dlMonthSelect').appendChild(opt);
        });
        document.getElementById('dlYearSelect').innerHTML = '';
        for (let y = 2024; y <= 2030; y++) {
            let opt = document.createElement('option'); opt.value = y; opt.innerText = y;
            document.getElementById('dlYearSelect').appendChild(opt);
        }
        document.getElementById('dlMonthSelect').value = selectedMonth;
        document.getElementById('dlYearSelect').value = selectedYear;
        document.getElementById('dlToDate').value = new Date(today.getTime() - (today.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
        let weekAgo = new Date(today); weekAgo.setDate(weekAgo.getDate() - 7);
        document.getElementById('dlFromDate').value = new Date(weekAgo.getTime() - (weekAgo.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
    }

    window.downloadMonthlyReport = () => {
        const u = document.getElementById('dlUserSelect').value;
        const m = parseInt(document.getElementById('dlMonthSelect').value);
        const y = parseInt(document.getElementById('dlYearSelect').value);
        let csvContent = "data:text/csv;charset=utf-8,Username,Month,Year,Habit Name,Total Monthly Goal,Days Completed,Progress %\n";
        const daysInReqMonth = new Date(y, m + 1, 0).getDate();
        let workingDaysInReqMonth = 0;
        for(let d = 1; d <= daysInReqMonth; d++) { if(new Date(y, m, d).getDay() !== 6) workingDaysInReqMonth++; }
        const usersToDownload = u === 'all' ? users.filter(x => x.role === 'user') : [users.find(x => x.username === u)];

        let fetchPromises = usersToDownload.map(async (userObj) => {
            if(!userObj) return;
            const storageKey = `${userObj.username}_${y}_${m}`;
            const docSnap = await getDoc(doc(db, "habits", storageKey));
            const savedData = docSnap.exists() ? docSnap.data() : {};
            habits.forEach(habit => {
                const checkedDaysArray = savedData[habit.id] || [];
                const validCheckedDays = checkedDaysArray.filter(day => new Date(y, m, day).getDay() !== 6).length;
                const monthlyGoal = habit.dailyTarget * workingDaysInReqMonth;
                const percentage = workingDaysInReqMonth > 0 ? ((validCheckedDays / workingDaysInReqMonth) * 100).toFixed(2) : 0;
                csvContent += `${userObj.username},${monthNames[m]},${y},"${habit.name}",${monthlyGoal},${validCheckedDays},${percentage}%\n`;
            });
        });

        Promise.all(fetchPromises).then(() => {
            const link = document.createElement("a");
            link.setAttribute("href", encodeURI(csvContent));
            link.setAttribute("download", `MonthlyReport_${u === 'all' ? 'All' : u}_${monthNames[m]}_${y}.csv`);
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
        });
    };

    window.downloadDateRangeReport = () => {
        const u = document.getElementById('dlUserSelect').value;
        const fromDateVal = document.getElementById('dlFromDate').value;
        const toDateVal = document.getElementById('dlToDate').value;
        if (!fromDateVal || !toDateVal) return alert("Select both From and To dates.");
        const fParts = fromDateVal.split('-'); const tParts = toDateVal.split('-');
        const startDate = new Date(fParts[0], fParts[1] - 1, fParts[2]);
        const endDate = new Date(tParts[0], tParts[1] - 1, tParts[2]);
        if (startDate > endDate) return alert("From Date cannot be after To Date.");

        let csvContent = "data:text/csv;charset=utf-8,Username,Date,Habit Name,Status\n";
        const usersToDownload = u === 'all' ? users.filter(x => x.role === 'user') : [users.find(x => x.username === u)];

        // Group fetches by unique month documents required
        let monthKeys = [];
        let cur = new Date(startDate.getTime());
        while(cur <= endDate) {
            let k = `${cur.getFullYear()}_${cur.getMonth()}`;
            if(!monthKeys.includes(k)) monthKeys.push(k);
            cur.setDate(cur.getDate() + 1);
        }

        let fetchPromises = [];
        let pulledData = {};
        usersToDownload.forEach(userObj => {
            if(!userObj) return;
            monthKeys.forEach(key => {
                const p = getDoc(doc(db, "habits", `${userObj.username}_${key}`)).then(snap => {
                    if(!pulledData[userObj.username]) pulledData[userObj.username] = {};
                    pulledData[userObj.username][key] = snap.exists() ? snap.data() : {};
                });
                fetchPromises.push(p);
            });
        });

        Promise.all(fetchPromises).then(() => {
            usersToDownload.forEach(userObj => {
                if(!userObj) return;
                let currentDate = new Date(startDate.getTime());
                while(currentDate <= endDate) {
                    let y = currentDate.getFullYear(); let m = currentDate.getMonth(); let d = currentDate.getDate();
                    let dateString = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                    const savedData = (pulledData[userObj.username] && pulledData[userObj.username][`${y}_${m}`]) || {};
                    habits.forEach(habit => {
                        let statusText = currentDate.getDay() === 6 ? "OFF (Saturday)" : ((savedData[habit.id] || []).includes(d) ? "Completed" : "Incomplete");
                        csvContent += `${userObj.username},${dateString},"${habit.name}",${statusText}\n`;
                    });
                    currentDate.setDate(currentDate.getDate() + 1);
                }
            });
            const link = document.createElement("a");
            link.setAttribute("href", encodeURI(csvContent));
            link.setAttribute("download", `DateRange_${u === 'all' ? 'All' : u}_${fromDateVal}_to_${toDateVal}.csv`);
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
        });
    };

    // --- HTML INTERFACE ATTACHMENTS (EXPORTS) ---
    window.attemptLogin = attemptLogin;
    window.saveSecuritySetup = saveSecuritySetup;
    window.saveTrackerState = saveTrackerState;
    window.loadUserData = loadUserData;
    window.logout = logout;
    window.changePassword = changePassword;
    window.forgotPassword = forgotPassword;
    window.handleLoginKeyPress = (e) => { if (e.key === 'Enter') attemptLogin(); };
    window.handleSetupKeyPress = (e) => { if (e.key === 'Enter') saveSecuritySetup(); };
    
    window.togglePasswordVisibility = (inputId, iconElement) => {
        const input = document.getElementById(inputId);
        if (input.type === "password") { input.type = "text"; iconElement.innerText = "🙈"; }
        else { input.type = "password"; iconElement.innerText = "👁️"; }
    };

    window.createUser = async () => {
        const u = document.getElementById('newUsername').value.trim().toLowerCase();
        const p = document.getElementById('newPassword').value.trim();
        if(!u || !p) return alert("Enter credentials");
        if(users.find(x => x.username.toLowerCase() === u)) return alert("User exists!");
        
        users.push({ username: u, password: p, role: 'user', secQuestion: null, secAnswer: null });
        await saveUsersToCloud();
        document.getElementById('newUsername').value = '';
        document.getElementById('newPassword').value = '';
        renderUserList();
        initAdminControls();
    };

    window.adminResetUserPassword = async (targetUsername) => {
        const newPass = prompt(`Admin Override: Enter a new password for '${targetUsername}':`);
        if (newPass && newPass.trim() !== "") {
            const user = users.find(u => u.username === targetUsername);
            if (user) {
                user.password = newPass.trim();
                await saveUsersToCloud();
                renderUserList();
                alert(`Password updated.`);
            }
        }
    };

    window.deleteUser = async (username) => {
        if(confirm(`Delete ${username}?`)) {
            users = users.filter(u => u.username !== username);
            await saveUsersToCloud();
            renderUserList();
            initAdminControls(); 
        }
    };

    window.viewUserDash = (targetUsername) => {
        viewingUsername = targetUsername;
        showView('appView');
        document.getElementById('backToAdminBtn').style.display = 'inline-block';
        initControls();
        loadUserData();
    };

    window.routeUser = routeUser;

    function showView(viewId) {
        document.getElementById('loginView').style.display = 'none';
        document.getElementById('setupSecurityView').style.display = 'none';
        document.getElementById('adminView').style.display = 'none';
        document.getElementById('appView').style.display = 'none';
        document.getElementById(viewId).style.display = 'block';
        if(viewId !== 'appView') document.getElementById('backToAdminBtn').style.display = 'none';
    }

    window.onload = checkSession;
</script>
